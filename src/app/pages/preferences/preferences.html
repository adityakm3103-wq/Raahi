<app-sidebar></app-sidebar>

<main class="min-h-screen bg-background pb-32">
  <div class="max-w-4xl mx-auto px-6 py-12 md:py-20 animate-fade-in text-center">

    <!-- HEADER -->
    <header class="space-y-4 mb-20">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="M18 21V5"/><path d="M6 21v-7"/></svg>
        Tailor Your Voyage
      </div>
      <h1 class="text-5xl md:text-7xl font-bold font-outfit tracking-tighter text-foreground italic">
        Set <span class="text-primary">Coordinates</span>
      </h1>
      <p class="text-muted-foreground text-lg font-light max-w-xl mx-auto">
        Define the parameters of your next legendary expedition.
      </p>
    </header>

    <form (ngSubmit)="savePreferences()" class="card-elegant p-10 md:p-16 text-left space-y-12 animate-slide-up">
      
      <div class="grid md:grid-cols-2 gap-x-12 gap-y-8">
        <!-- Departure -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Departure Point</label>
          <input [(ngModel)]="startLocation" name="startLocation" type="text" placeholder="CHOOSE ORIGIN" 
                 class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-bold placeholder:text-muted-foreground/30" required />
        </div>

        <!-- Destination -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Final Destination</label>
          <input [(ngModel)]="destination" name="destination" type="text" placeholder="WHERE TO?" 
                 class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-bold placeholder:text-muted-foreground/30" required />
        </div>

        <!-- Dates -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Commencement</label>
          <input [(ngModel)]="startDate" name="startDate" type="date" 
                 class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" required />
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Conclusion</label>
          <input [(ngModel)]="returnDate" name="returnDate" type="date" 
                 class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" required />
        </div>

        <!-- Budget -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Budgetary Scale</label>
          <input [(ngModel)]="budget" name="budget" type="text" placeholder="e.g. ₹50,000" 
                 class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-bold placeholder:text-muted-foreground/30" />
        </div>

        <!-- Expedition Type -->
        <div class="space-y-2 text-left">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Expedition Type</label>
          <div class="relative">
            <select [(ngModel)]="travelType" name="travelType" 
                    class="w-full bg-muted/20 border border-border p-4 rounded-xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all appearance-none font-bold">
              <option value="Solo">Solo</option>
              <option value="Partner">Partner</option>
              <option value="Friends">Friends</option>
              <option value="Family">Family</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-muted-foreground">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
          </div>
        </div>

        <!-- Inclinations -->
        <div class="md:col-span-2 space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Specific Inclinations</label>
          <textarea
            [(ngModel)]="preferences"
            name="preferences"
            class="w-full bg-muted/20 border border-border p-6 rounded-2xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-muted-foreground/30 font-light italic"
            rows="3"
            placeholder="e.g. Boutique hotels, Sunset view points, Culinary experiments..."
          ></textarea>
        </div>
      </div>

      <!-- Group Members -->
      <div *ngIf="travelType !== 'Solo'" class="space-y-8 pt-10 border-t border-border animate-fade-in">
        <div class="flex justify-between items-center">
          <h3 class="text-2xl font-bold font-outfit italic tracking-tight">Fellow Voyagers</h3>
          <button type="button" (click)="addGroupMember()" class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary/70 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Enlist Member
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div *ngFor="let member of groupMembers; let i = index" class="p-6 bg-muted/20 border border-border rounded-3xl space-y-4 group transition-all hover:border-primary/30">
            <div class="flex justify-between items-start">
              <div class="flex-1 space-y-4">
                <div class="space-y-1">
                   <label class="text-[9px] font-bold text-muted-foreground uppercase opacity-60">Identity</label>
                   <input [(ngModel)]="member.name" name="name{{i}}" placeholder="Member Name" 
                       class="w-full bg-transparent border-b border-border py-2 text-foreground text-sm focus:border-primary outline-none transition-all font-bold placeholder:text-muted-foreground/30" />
                </div>
                <div class="space-y-1">
                   <label class="text-[9px] font-bold text-muted-foreground uppercase opacity-60">Passions</label>
                   <input [(ngModel)]="member.interests" name="interest{{i}}" placeholder="What fuels their journey?" 
                       class="w-full bg-transparent border-b border-border py-2 text-foreground text-sm focus:border-primary outline-none transition-all font-light italic placeholder:text-muted-foreground/30" />
                </div>
              </div>
              <button
                type="button"
                (click)="removeGroupMember(i)"
                class="p-2 text-muted-foreground hover:text-red-500 transition-colors ml-4"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="pt-6 flex justify-center">
        <button
          type="submit"
          [disabled]="loading"
          class="btn-elegant px-16 py-5 text-[10px] tracking-[0.3em]"
        >
          {{ loading ? 'Saving...' : 'Finalize Coordinates' }}
        </button>
      </div>
    </form>
  </div>
</main>
