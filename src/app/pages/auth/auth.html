<main class="min-h-screen bg-background flex flex-col items-center justify-center p-6 relative overflow-hidden">
  
  <!-- Back to Home -->
  <a routerLink="/" class="absolute top-8 left-8 text-muted-foreground hover:text-primary transition-all flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest z-20 group">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><path d="m15 18-6-6 6-6"/></svg>
    Return Home
  </a>

  <!-- Subtle background glow -->
  <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-md space-y-8 animate-slide-up relative z-10">
    <!-- Logo/Brand -->
    <div class="text-center space-y-4">
      <div class="w-16 h-16 mx-auto bg-primary rounded-2xl flex items-center justify-center shadow-elegant">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
      </div>
      <h1 class="text-4xl font-bold font-outfit tracking-tighter text-foreground italic">Raahi</h1>
      <p class="text-muted-foreground text-sm font-light">Enter the realm of bespoke exploration.</p>
    </div>

    <!-- Auth Card -->
    <div class="bg-surface dark:bg-surface-dark p-8 md:p-12 rounded-4xl border border-border shadow-elegant">
      
      <form (ngSubmit)="handleAuth()" class="space-y-6">
        
        <!-- Full Name -->
        <div *ngIf="mode === 'signup'" class="space-y-2 animate-fade-in">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Identity</label>
          <input
            [(ngModel)]="fullName"
            name="fullName"
            type="text"
            placeholder="Nom de Plume"
            class="w-full bg-muted/20 border border-border rounded-xl px-5 py-3.5 text-foreground text-sm outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-300 placeholder:text-muted-foreground/40"
            required
          />
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Coordinates</label>
          <input
            [(ngModel)]="email"
            name="email"
            type="email"
            placeholder="email@journey.com"
            class="w-full bg-muted/20 border border-border rounded-xl px-5 py-3.5 text-foreground text-sm outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-300 placeholder:text-muted-foreground/40"
            required
          />
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <label class="block text-[10px] font-bold uppercase tracking-widest text-muted-foreground ml-1">Keyphrase</label>
          <input
            [(ngModel)]="password"
            name="password"
            type="password"
            placeholder="••••••••"
            class="w-full bg-muted/20 border border-border rounded-xl px-5 py-3.5 text-foreground text-sm outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-300 placeholder:text-muted-foreground/40 tracking-widest"
            required
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full btn-elegant py-4 mt-4 text-xs font-bold uppercase tracking-widest"
        >
          {{ loading ? 'Synchronizing...' : (mode === 'signin' ? 'Unlock Access' : 'Create Legacy') }}
        </button>
      </form>

      <div class="relative py-8">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-border"></div></div>
        <div class="relative flex justify-center"><span class="bg-surface dark:bg-surface-dark px-4 text-[10px] font-bold uppercase tracking-widest text-muted-foreground/60">Or continue with</span></div>
      </div>

      <!-- Social Auth (Mock) -->
      <div class="grid grid-cols-2 gap-4">
        <button type="button" class="flex items-center justify-center gap-3 py-3 border border-border rounded-xl hover:bg-muted transition-all duration-300">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
           <span class="text-xs font-bold font-outfit">Google</span>
        </button>
        <button type="button" class="flex items-center justify-center gap-3 py-3 border border-border rounded-xl hover:bg-muted transition-all duration-300">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.625 0C5.204 0 0 5.204 0 11.625c0 5.127 3.344 9.478 8.025 11.025.581.107.794-.252.794-.56 0-.276-.011-1.007-.016-1.977-3.235.703-3.918-1.559-3.918-1.559-.529-1.344-1.291-1.701-1.291-1.701-1.056-.721.08-.707.08-.707 1.168.082 1.783 1.199 1.783 1.199 1.037 1.776 2.716 1.263 3.377.965.105-.75.405-1.263.737-1.553-2.583-.293-5.298-1.291-5.298-5.748 0-1.27.453-2.308 1.198-3.123-.12-.294-.52-1.477.114-3.08 0 0 .976-.312 3.2 1.192.93-.258 1.926-.388 2.915-.393.989.005 1.984.135 2.916.393 2.223-1.504 3.197-1.192 3.197-1.192.636 1.603.236 2.786.116 3.08.746.815 1.196 1.853 1.196 3.123 0 4.469-2.72 5.452-5.308 5.738.417.359.787 1.068.787 2.152 0 1.555-.014 2.81-.014 3.19 0 .31.21.673.799.558C20.66 21.102 24 16.753 24 11.625 24 5.204 18.796 0 11.625 0z"/></svg>
           <span class="text-xs font-bold font-outfit">GitHub</span>
        </button>
      </div>

    </div>

    <!-- Toggle Mode -->
    <div class="text-center">
      <p class="text-muted-foreground text-xs font-medium">
        {{ mode === 'signin' ? "Not yet part of the odyssey?" : 'Already registered your legacy?' }}
        <button
          (click)="toggleMode()"
          type="button"
          class="text-primary hover:underline font-bold ml-1 transition-all"
        >
          {{ mode === 'signin' ? 'Sign Up' : 'Sign In' }}
        </button>
      </p>
    </div>
  </div>

  <!-- Decorative Footer -->
  <div class="mt-20 text-[10px] font-bold uppercase tracking-[0.4em] text-muted-foreground/30 select-none">
    Raahi Premium Travel System v2.1
  </div>
</main>
