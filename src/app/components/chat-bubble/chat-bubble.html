<!-- 🫧 Floating Bubble -->
<button
  class="fixed bottom-28 right-8 w-16 h-16 bg-primary text-white rounded-2xl shadow-elegant flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-[100] group"
  type="button"
  (click)="toggleOpen()"
  *ngIf="!isOpen"
>
  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-12 transition-transform"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
</button>

<!-- 💬 Chat Window -->
<div *ngIf="isOpen" class="fixed inset-0 z-[200] bg-black/40 backdrop-blur-sm flex items-end md:items-center justify-center md:justify-end p-6 animate-fade-in" (click)="$event.target === chatOverlay && close()" #chatOverlay>
  <div class="bg-surface dark:bg-surface-dark w-full max-w-md h-[80vh] md:h-[600px] md:mr-6 rounded-4xl border border-border shadow-2xl flex flex-col overflow-hidden animate-slide-up" (click)="$event.stopPropagation()">

    <!-- Header -->
    <header class="p-6 border-b border-border flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="space-y-0.5">
          <h3 class="text-sm font-bold font-outfit text-foreground italic">Raahi Sidekick</h3>
          <div class="flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-[9px] font-bold uppercase tracking-widest text-muted-foreground">{{ destination ? destination : 'Active Assistant' }}</span>
          </div>
        </div>
      </div>

      <button class="w-10 h-10 rounded-xl hover:bg-muted flex items-center justify-center text-muted-foreground transition-colors" type="button" (click)="close()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </header>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-none bg-muted/5">
      <div
        *ngFor="let msg of messages"
        class="flex flex-col"
        [ngClass]="{ 'items-start': isAssistant(msg), 'items-end': !isAssistant(msg) }"
      >
        <div 
          class="max-w-[85%] px-5 py-3 rounded-2xl text-sm leading-relaxed"
          [ngClass]="{ 
            'bg-muted/30 text-foreground rounded-bl-none': isAssistant(msg), 
            'bg-primary text-white shadow-elegant rounded-br-none': !isAssistant(msg) 
          }"
        >
          {{ msg.content }}
        </div>
        <span class="mt-1.5 text-[8px] font-bold uppercase tracking-widest text-muted-foreground/50">
          {{ msg.timestamp | date: 'shortTime' }}
        </span>
      </div>

      <div *ngIf="isSending" class="flex gap-1.5 p-2 items-center">
        <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0s"></span>
        <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
        <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
      </div>
    </div>

    <!-- Input -->
    <div class="p-6 border-t border-border bg-surface dark:bg-surface-dark">
      <div class="relative flex items-center">
        <textarea
          [(ngModel)]="inputText"
          (keydown)="onKeyDown($event)"
          rows="1"
          placeholder="Ask anything..."
          class="w-full bg-muted/20 border border-border p-4 pr-14 rounded-2xl text-foreground text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all resize-none max-h-32 scrollbar-none"
        ></textarea>

        <button
          type="button"
          class="absolute right-3 w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg disabled:opacity-50 disabled:grayscale transition-all active:scale-90"
          [disabled]="isSending || !inputText.trim()"
          (click)="send()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
